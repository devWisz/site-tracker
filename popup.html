<!DOCTYPE html>
<html>
<head>
  <title>Site Tracker Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="wrapper">
  <h1>Site Tracker</h1>
  <div class="stats">
    <div>
      <span>Total Visits</span>
      <strong id="totalVisits">0</strong>
    </div>
    <div>
      <span>Most Visited</span>
      <strong id="mostVisited">None</strong>
    </div>
  </div>
  <div class="top-actions">
    <button id="saveTab" class="primary">Save Current Tab</button>
    <button id="toggleHistory" class="secondary">Show History</button>
  </div>
  <div class="manual-section">
    <input type="text" id="manualUrl" placeholder="Add site manually">
    <button id="addManual" class="primary">Add</button>
  </div>

  <div id="historySection" class="hidden">
    <h2>Saved History</h2>
    <div id="historyList"></div>
    <button id="resetData" class="danger small">Reset All</button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
